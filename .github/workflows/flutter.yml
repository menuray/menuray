name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/merchant/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'frontend/merchant/**'
      - '.github/workflows/flutter.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/merchant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded

  build-web:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: frontend/merchant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/merchant/build/web
          retention-days: 7
